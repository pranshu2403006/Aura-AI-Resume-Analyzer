<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI</title>
    <!-- Modern Tailwind CSS via CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #09090b 0%, #171720 100%);
            color: #f3f4f6;
        }
        
        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative overflow-x-hidden bg-[#09090b]">
    
    <!-- Ambient Background Glow Effects -->
    <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-indigo-600/20 blur-[120px] animate-pulse" style="animation-duration: 4s;"></div>
        <div class="absolute top-[60%] -right-[10%] w-[60%] h-[60%] rounded-full bg-purple-600/20 blur-[150px]" style="animation: pulse 7s cubic-bezier(0.4, 0, 0.6, 1) infinite;"></div>
        <div class="absolute top-[30%] left-[30%] w-[40%] h-[40%] rounded-full bg-blue-600/10 blur-[100px]" style="animation: pulse 10s ease-in-out infinite alternate;"></div>
    </div>
    
    <!-- Navbar -->
    <nav class="glass-panel border-b border-gray-800/60 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{% url 'home' %}" class="text-white text-2xl font-bold flex items-center gap-3 tracking-tight">
                <div class="p-2 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                Aura <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">AI</span>
            </a>
            <div class="flex items-center gap-4 text-sm font-semibold">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}" class="text-gray-300 hover:text-white px-4 py-2 rounded-lg transition-all duration-200 hover:bg-white/10 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                        Dashboard
                    </a>
                    <a href="{% url 'logout' %}" class="text-indigo-400 hover:text-indigo-300 px-4 py-2 rounded-lg border border-indigo-500/30 hover:bg-indigo-500/10 transition-colors">Log Out</a>
                {% else %}
                    <a href="{% url 'login' %}" class="text-gray-300 hover:text-white transition-colors">Sign In</a>
                    <a href="{% url 'register' %}" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-lg shadow-md transition-all duration-200 ml-2">Create Account</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800/50 mt-auto py-8 text-center text-gray-500 text-sm">
        <p>&copy; {% now "Y" %} Aura AI. Build your future with intelligent insights.</p>
    </footer>
</body>
</html>
